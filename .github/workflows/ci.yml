name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt ruff

      - name: Lint
        run: ruff check api/app

      - name: Validate Python syntax
        run: python -m compileall api/app

      - name: Build Docker image
        run: docker build -t yt-download-api:ci .
