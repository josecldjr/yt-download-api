apiVersion: apps/v1
kind: Deployment
metadata:
  name: yt-download-api
  namespace: default
  labels:
    app: yt-download-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yt-download-api
  template:
    metadata:
      labels:
        app: yt-download-api
    spec:
      containers:
        - name: yt-download-api
          image: ghcr.io/josecldjr/yt-download-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: yt-download-api-config
          env:
            - name: MANAGEMENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yt-download-api-secrets
                  key: management-secret
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yt-download-api-secrets
                  key: token-encryption-key
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: yt-download-api-data
